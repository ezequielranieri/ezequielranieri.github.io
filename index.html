<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0a'/%3E%3Ctext x='15' y='70' font-family='monospace' font-weight='bold' font-size='60' fill='%2300ff41'%3E%3E_%3C/text%3E%3C/svg%3E">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 2.2.19 -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.5);
            --secondary: #00d4ff;
            --bg-deep: #0a0a0a;
            --bg-card: #161b22;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-mono { font-family: 'Space Mono', monospace; }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.06),
                rgba(0, 255, 0, 0.02),
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 99;
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .glitch-hover:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
            text-shadow: 2px 0 var(--danger), -2px 0 var(--secondary);
        }

        /* Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Neon Glows */
        .glow-text { text-shadow: 0 0 10px var(--primary-glow); }
        .glow-border { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .glow-border-hover:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .type-cursor::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0; } 
        }

        .nav-blur {
            backdrop-filter: blur(8px);
            background: rgba(10, 10, 10, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---

        const TypingText = ({ text, speed = 100, delay = 0, className = "" }) => {
            const [displayedText, setDisplayedText] = useState("");
            const [started, setStarted] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setStarted(true), delay);
                return () => clearTimeout(timer);
            }, [delay]);

            useEffect(() => {
                if (!started) return;
                if (displayedText.length < text.length) {
                    const nextChar = setTimeout(() => {
                        setDisplayedText(text.slice(0, displayedText.length + 1));
                    }, speed);
                    return () => clearTimeout(nextChar);
                }
            }, [displayedText, started, text, speed]);

            return (
                <span className={`${className} ${displayedText.length < text.length ? 'type-cursor' : ''}`}>
                    {displayedText}
                </span>
            );
        };

        const Section = ({ children, id, className = "" }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => setVisible(entry.isIntersecting));
                });
                observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <section 
                    id={id} 
                    ref={domRef} 
                    className={`reveal ${isVisible ? 'active' : ''} ${className}`}
                >
                    {children}
                </section>
            );
        };

        const ProjectCard = ({ project }) => (
            <div className="bg-gray-900 border border-gray-800 p-6 rounded-lg transition-all duration-300 glow-border-hover group">

                        </svg>
                    </a>

                    {project.description}

                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce text-gray-600">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7-7-7m14-8l-7 7-7-7" />
                            </svg>
                        </div>
                    </section>

                    {/* About Section */}
                    <Section id="about" className="py-32 px-6 max-w-4xl mx-auto">
                        <h2 className="text-3xl font-mono text-green-400 mb-8 flex items-center">
                            <span className="mr-4">01.</span> ABOUT_ME
                        </h2>
                        <div className="space-y-6 text-lg text-gray-400 leading-relaxed">
                            <p className="font-mono text-white italic bg-gray-900 border-l-4 border-green-500 p-4">
                                "self-taught developer. no degree. no certifications. just real problems and the drive to solve them."
                            </p>
                            <p>
                                I specialize in building robust backend systems and security-focused tools using <span className="text-green-400">Python</span>. 
                                My approach is driven by curiosity and a deep-seated need to understand how things work under the hood.
                            </p>
                            <p>
                                From automated reconnaissance to production-grade APIs, I focus on writing clean, 
                                efficient, and secure code that solves actual security challenges.
                            </p>
                        </div>
                    </Section>

                    {/* Projects Section */}
                    <Section id="projects" className="py-32 px-6 max-w-6xl mx-auto">
                        <h2 className="text-3xl font-mono text-green-400 mb-12 flex items-center">
                            <span className="mr-4">02.</span> SELECTED_PROJECTS
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {projects.map(p => <ProjectCard key={p.name} project={p} />)}

                    </Section>

                    {/* Contact Section */}
                    <Section id="contact" className="py-32 px-6 text-center max-w-2xl mx-auto">

                        <p className="text-gray-400 mb-12 text-lg">

                    {/* Footer */}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

</body>
</html>
